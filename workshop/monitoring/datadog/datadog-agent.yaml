# Datadog Agent overlay for dstack-kms
#
# Append this `services:` block to your kms docker-compose.yaml
# (i.e. workshop-run/kms-prod/docker-compose.yaml after copying from
# workshop/kms/docker-compose.direct.yaml or docker-compose.light.yaml).
#
# The dstack-kms image enables the Prometheus `/metrics` endpoint by
# default (kms.toml: `[core.metrics] enabled = true`). The agent below
# scrapes it over Docker DNS at `https://kms:8000/metrics` with TLS
# verification disabled (the KMS uses an auto-generated RA-TLS cert).
#
# Required env vars (set via prelaunch.sh -> .env):
#   DD_API_KEY=<datadog api key>
#   DD_SITE=<datadoghq.com|us5.datadoghq.com|...>
#
# Optional:
#   DD_ENV=production
#   DD_SERVICE=dstack-kms
#   DD_TAGS=env:production,service:dstack-kms

services:
  datadog-agent:
    image: registry.datadoghq.com/agent:7
    restart: unless-stopped
    depends_on:
      - kms
    environment:
      - DD_API_KEY=${DD_API_KEY:?set DD_API_KEY in .env}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_ENV=${DD_ENV:-production}
      - DD_SERVICE=${DD_SERVICE:-dstack-kms}
      - DD_TAGS=${DD_TAGS:-env:production,service:dstack-kms}
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_CONTAINER_EXCLUDE=name:datadog-agent
      - DD_AC_EXCLUDE=name:datadog-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    command:
      - bash
      - -c
      - |
        set -e
        mkdir -p /etc/datadog-agent/conf.d/openmetrics.d
        printf 'instances:\n  - openmetrics_endpoint: https://kms:8000/metrics\n    tls_verify: false\n    namespace: dstack_kms\n    metrics:\n      - .*\n    tags:\n      - service:dstack-kms\n' \
          > /etc/datadog-agent/conf.d/openmetrics.d/conf.yaml
        exec agent run
    healthcheck:
      test: ["CMD", "agent", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
